<!DOCTYPE html>
<html lang="fr">
<head>
<meta name="robots" content="noindex, nofollow">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPAS – Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏎️</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #ec6608;
    --orange-bright: #ff7a20;
    --orange-glow: rgba(236,102,8,0.35);
    --black: #080808;
    --gray: #9a9b9c;
    --gray-dark: #2a2a2a;
    --gray-mid: #141414;
    --gray-light: #b8b9ba;
    --surface: #0f0f0f;
    --surface-raised: #181818;
    --border: rgba(154,155,156,0.12);
    --border-orange: rgba(236,102,8,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background-color: var(--black);
    color: white;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ── Texture background ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(236,102,8,0.07) 0%, transparent 70%),
      repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(255,255,255,0.012) 2px, rgba(255,255,255,0.012) 4px),
      repeating-linear-gradient(-45deg, transparent, transparent 2px, rgba(255,255,255,0.006) 2px, rgba(255,255,255,0.006) 4px);
    pointer-events: none;
    z-index: 0;
  }

  /* ══════════════════════════════════
     HEADER & LOGO
  ══════════════════════════════════ */

  header {
    position: relative;
    z-index: 10;
    padding: 0 48px;
    border-bottom: 1px solid rgba(236,102,8,0.25);
    display: flex;
    align-items: center;
    gap: 32px;
    min-height: 96px;
    overflow: hidden;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, var(--orange) 0%, transparent 80%);
  }

  /* Animated stripe on left edge */
  .header-accent {
    width: 5px;
    height: 64px;
    background: linear-gradient(180deg, var(--orange-bright), var(--orange), #b84d00);
    flex-shrink: 0;
    clip-path: polygon(0 0, 100% 6%, 100% 94%, 0 100%);
    animation: accentGrow 0.8s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes accentGrow {
    from { height: 0; opacity: 0; }
    to   { height: 64px; opacity: 1; }
  }

  /* Logo */
  .header-logo {
    height: 52px;
    width: auto;
    object-fit: contain;
    animation: logoReveal 1s cubic-bezier(0.22,1,0.36,1) 0.15s both;
    filter: drop-shadow(0 0 12px rgba(236,102,8,0.25));
    flex-shrink: 0;
  }

  @keyframes logoReveal {
    0%   { opacity: 0; transform: translateX(-20px) scale(0.92); filter: drop-shadow(0 0 0px rgba(236,102,8,0)); }
    60%  { filter: drop-shadow(0 0 20px rgba(236,102,8,0.5)); }
    100% { opacity: 1; transform: translateX(0) scale(1); filter: drop-shadow(0 0 12px rgba(236,102,8,0.25)); }
  }

  .header-divider {
    width: 1px;
    height: 40px;
    background: rgba(154,155,156,0.2);
    flex-shrink: 0;
    animation: fadeIn 0.6s ease 0.5s both;
  }

  .header-text {
    animation: fadeIn 0.6s ease 0.4s both;
  }

  header h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 2.4rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    line-height: 1;
  }

  header h1 span { color: var(--orange); }

  header p {
    font-size: 0.8rem;
    color: var(--gray);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-top: 5px;
    font-family: 'Barlow', sans-serif;
    font-weight: 400;
  }

  /* Race speed strip */
  .speed-strip {
    position: relative;
    z-index: 1;
    height: 3px;
    overflow: hidden;
  }

  .speed-strip::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, var(--orange) 30%, var(--orange-bright) 50%, var(--orange) 70%, transparent 100%);
    animation: stripSweep 2s cubic-bezier(0.22,1,0.36,1) 0.2s both;
    transform-origin: left;
  }

  @keyframes stripSweep {
    from { transform: scaleX(0); }
    to   { transform: scaleX(1); }
  }

  /* ══════════════════════════════════
     MAIN LAYOUT
  ══════════════════════════════════ */

  main {
    position: relative;
    z-index: 1;
    padding: 52px 48px;
    max-width: 1500px;
    margin: 0 auto;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ══════════════════════════════════
     CHALLENGE COMMERCIAL
  ══════════════════════════════════ */

  .challenge-wrapper {
    margin-bottom: 60px;
    animation: fadeUp 0.5s ease both;
  }

  .challenge-toggle {
    display: flex;
    align-items: center;
    gap: 18px;
    cursor: pointer;
    user-select: none;
    padding: 22px 28px;
    background: var(--surface-raised);
    border: 1px solid var(--border-orange);
    border-left: 4px solid var(--orange);
    position: relative;
    overflow: hidden;
    transition: background 0.2s ease, box-shadow 0.2s ease;
  }

  .challenge-toggle::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, rgba(236,102,8,0.08) 0%, transparent 55%);
    pointer-events: none;
  }

  .challenge-toggle:hover {
    background: #1e1e1e;
    box-shadow: 0 4px 32px rgba(236,102,8,0.1);
  }

  .challenge-toggle-icon {
    width: 30px;
    height: 30px;
    border: 1px solid rgba(236,102,8,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
    transition: background 0.2s;
  }

  .challenge-toggle:hover .challenge-toggle-icon {
    background: rgba(236,102,8,0.08);
  }

  .challenge-toggle-icon::before,
  .challenge-toggle-icon::after {
    content: '';
    position: absolute;
    background: var(--orange);
    transition: transform 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.3s;
  }
  .challenge-toggle-icon::before { width: 13px; height: 2px; }
  .challenge-toggle-icon::after  { width: 2px; height: 13px; }

  .challenge-wrapper.open .challenge-toggle-icon::after {
    transform: rotate(90deg);
    opacity: 0;
  }

  .challenge-toggle-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 1.2rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: white;
    flex: 1;
  }

  .challenge-toggle-sub {
    font-size: 0.8rem;
    color: var(--gray);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-family: 'Barlow', sans-serif;
  }

  .challenge-toggle-star {
    font-size: 1rem;
    color: var(--orange);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
  }

  @keyframes float {
    0%,100% { transform: translateY(0) rotate(-5deg); }
    50%      { transform: translateY(-6px) rotate(5deg); }
  }

  .crown-mini {
    font-size: 1.15rem;
    animation: float 2.8s ease-in-out infinite;
    display: inline-block;
  }

  /* Collapsible body */
  .challenge-body {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.65s cubic-bezier(0.4,0,0.2,1);
    border: 1px solid rgba(236,102,8,0.15);
    border-top: none;
    background: #0a0a0a;
  }

  .challenge-wrapper.open .challenge-body {
    max-height: 1000px;
  }

  .challenge-inner {
    padding: 48px 40px 56px;
  }

  /* ── Chart ── */
  .chart-area {
    display: flex;
    align-items: flex-end;
    gap: 0;
    height: 380px;
    position: relative;
    padding-left: 8px;
  }

  /* Grid lines */
  .chart-area::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      0deg,
      transparent,
      transparent calc(25% - 1px),
      rgba(255,255,255,0.04) calc(25% - 1px),
      rgba(255,255,255,0.04) 25%
    );
    pointer-events: none;
    z-index: 0;
  }

  /* Palier lines */
  .palier-line {
    position: absolute;
    left: 0;
    right: 0;
    border-top: 1px dashed rgba(236,102,8,0.5);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    pointer-events: none;
    z-index: 2;
  }

  .palier-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    color: var(--orange);
    background: #0a0a0a;
    padding: 3px 10px;
    border: 1px solid rgba(236,102,8,0.35);
    white-space: nowrap;
  }

  .palier-label .palier-bonus {
    display: block;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.78rem;
    color: #fff;
    letter-spacing: 0.03em;
    margin-top: 1px;
  }

  /* Bar columns */
  .bar-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    position: relative;
    height: 100%;
    z-index: 1;
  }

  .bar-photo-wrap {
    position: relative;
    margin-bottom: 10px;
    z-index: 3;
  }

  .bar-photo {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 2px solid rgba(236,102,8,0.35);
    object-fit: cover;
    background: var(--gray-dark);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: border-color 0.4s, box-shadow 0.4s;
  }

  .bar-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }

  .bar-photo-placeholder {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 2px solid rgba(236,102,8,0.35);
    background: var(--gray-dark);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 1.05rem;
    color: var(--orange);
    transition: border-color 0.4s, box-shadow 0.4s;
  }

  .bar-crown {
    position: absolute;
    top: -22px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 1.15rem;
    opacity: 0;
    transition: opacity 0.5s 1.2s;
  }

  .bar-col.reached-3 .bar-crown,
  .bar-col.reached-2 .bar-crown {
    opacity: 1;
    animation: float 2.4s ease-in-out infinite;
  }

  .bar-col.reached-3 .bar-photo,
  .bar-col.reached-3 .bar-photo-placeholder,
  .bar-col.reached-2 .bar-photo,
  .bar-col.reached-2 .bar-photo-placeholder {
    border-color: var(--orange);
    box-shadow: 0 0 20px rgba(236,102,8,0.45), 0 0 40px rgba(236,102,8,0.15);
  }

  /* CA value label above bar */
  .bar-value {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.82rem;
    letter-spacing: 0.06em;
    color: rgba(255,255,255,0.7);
    margin-bottom: 6px;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.4s, transform 0.4s;
    text-align: center;
  }

  .challenge-wrapper.open .bar-value {
    opacity: 1;
    transform: translateY(0);
    transition-delay: 1.2s;
  }

  /* The bar fill wrapper */
  .bar-fill-wrap {
    width: 62%;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: flex-end;
    border-radius: 2px 2px 0 0;
    background: rgba(255,255,255,0.03);
    /* Will have inline height set by JS */
  }

  .bar-fill {
    width: 100%;
    height: 0;
    background: linear-gradient(180deg,
      #ffaa44 0%,
      var(--orange-bright) 20%,
      var(--orange) 55%,
      #c55200 85%,
      #8b3a00 100%
    );
    transition: height 1.2s cubic-bezier(0.22, 1, 0.36, 1);
    position: relative;
    transform-origin: bottom;
    border-radius: 2px 2px 0 0;
  }

  /* Top highlight */
  .bar-fill::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    border-radius: 2px;
  }

  /* Shine sweep */
  .bar-fill::before {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    width: 35%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.14), transparent);
    animation: barShine 3s ease-in-out infinite;
    left: -35%;
  }

  @keyframes barShine {
    0%   { left: -35%; opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { left: 125%; opacity: 0; }
  }

  /* Pulse glow on bar when reached palier */
  .bar-col.reached-2 .bar-fill,
  .bar-col.reached-3 .bar-fill {
    animation: barPulse 2.5s ease-in-out infinite;
  }

  @keyframes barPulse {
    0%,100% { box-shadow: 0 0 8px rgba(236,102,8,0.3); }
    50%     { box-shadow: 0 0 24px rgba(236,102,8,0.6), 0 0 48px rgba(236,102,8,0.2); }
  }

  .bar-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gray-light);
    margin-top: 11px;
    text-align: center;
  }

  /* Legend */
  .challenge-legend {
    display: flex;
    gap: 28px;
    margin-top: 32px;
    flex-wrap: wrap;
    border-top: 1px solid rgba(255,255,255,0.05);
    padding-top: 24px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.85rem;
    color: var(--gray);
    letter-spacing: 0.06em;
    font-family: 'DM Sans', sans-serif;
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--orange);
    flex-shrink: 0;
  }

  .legend-item .legend-bonus {
    color: white;
    font-weight: 600;
  }

  /* ══════════════════════════════════
     LINK CATEGORIES
  ══════════════════════════════════ */

  .category {
    margin-bottom: 56px;
    animation: fadeUp 0.5s ease both;
  }
  .category:nth-child(1) { animation-delay: 0.08s; }
  .category:nth-child(2) { animation-delay: 0.16s; }
  .category:nth-child(3) { animation-delay: 0.24s; }
  .category:nth-child(4) { animation-delay: 0.32s; }

  .category-header {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 22px;
  }

  .category-number {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.22em;
    color: var(--orange);
    text-transform: uppercase;
  }

  .category-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 1.15rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: white;
  }

  .category-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(154,155,156,0.25), transparent);
  }

  .btn-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 14px;
  }

  .link-btn {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 22px 24px 20px;
    background: var(--surface-raised);
    border: 1px solid var(--border);
    border-left: 3px solid var(--orange);
    text-decoration: none;
    color: white;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
    min-height: 96px;
  }

  /* Subtle carbon-fiber texture */
  .link-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(255,255,255,0.008) 3px, rgba(255,255,255,0.008) 4px),
      repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,255,255,0.005) 3px, rgba(255,255,255,0.005) 4px);
    pointer-events: none;
  }

  /* Top glow on hover */
  .link-btn::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, var(--orange), rgba(236,102,8,0.4), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .link-btn:hover {
    background-color: #1c1c1c;
    border-color: rgba(236,102,8,0.35);
    transform: translateY(-3px);
    box-shadow:
      0 12px 32px rgba(0,0,0,0.6),
      0 0 0 1px rgba(236,102,8,0.15),
      inset 0 1px 0 rgba(255,255,255,0.04);
  }

  .link-btn:hover::after { opacity: 1; }
  .link-btn:active { transform: translateY(-1px); }

  .btn-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 1.18rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    line-height: 1.25;
    padding-right: 28px;
  }

  .btn-label .badge {
    display: inline-block;
    background: rgba(236,102,8,0.12);
    border: 1px solid rgba(236,102,8,0.4);
    color: var(--orange);
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    padding: 2px 7px;
    margin-left: 7px;
    vertical-align: middle;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    text-transform: uppercase;
  }

  .btn-desc {
    font-size: 0.82rem;
    color: var(--gray);
    margin-top: 6px;
    font-weight: 400;
    letter-spacing: 0.02em;
    line-height: 1.5;
    font-family: 'DM Sans', sans-serif;
  }

  .btn-arrow {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--orange);
    font-size: 1.1rem;
    opacity: 0.4;
    transition: all 0.2s ease;
  }

  .link-btn:hover .btn-arrow {
    opacity: 1;
    right: 16px;
  }

  /* ══════════════════════════════════
     FOOTER
  ══════════════════════════════════ */

  footer {
    position: relative;
    z-index: 1;
    padding: 24px 48px;
    border-top: 1px solid rgba(154,155,156,0.08);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  footer span {
    font-size: 0.75rem;
    color: rgba(154,155,156,0.35);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-family: 'Barlow', sans-serif;
  }

  .footer-dot {
    width: 6px;
    height: 6px;
    background: var(--orange);
    border-radius: 50%;
    animation: dotPulse 2.2s ease-in-out infinite;
  }

  @keyframes dotPulse {
    0%,100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(236,102,8,0.4); }
    50%     { opacity: 0.5; transform: scale(0.7); box-shadow: 0 0 0 6px rgba(236,102,8,0); }
  }

  /* ══════════════════════════════════
     RESPONSIVE
  ══════════════════════════════════ */

  @media (max-width: 768px) {
    header, main, footer { padding-left: 20px; padding-right: 20px; }
    header { min-height: 80px; gap: 20px; }
    .header-logo { height: 40px; }
    header h1 { font-size: 1.8rem; }
    .btn-grid { grid-template-columns: 1fr; }
    .challenge-inner { padding: 24px 16px 36px; }
    .bar-photo, .bar-photo-placeholder { width: 40px; height: 40px; font-size: 0.85rem; }
    .bar-fill-wrap { width: 72%; }
    .chart-area { height: 290px; }
    .header-divider { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-accent"></div>
  <img
    class="header-logo"
    src="https://raw.githubusercontent.com/mschneuwly-opas/dashboard/main/logo_Oceanie_Pneus_blc.png"
    alt="Océanie Pneus"
    onerror="this.style.display='none'"
  >
  <div class="header-divider"></div>
  <div class="header-text">
    <h1>OPAS <span>//</span> Links</h1>
    <p>Tableau de bord — Accès rapide</p>
  </div>
</header>
<div class="speed-strip"></div>

<main id="dashboard">

  <!-- Challenge commercial -->
  <div class="challenge-wrapper" id="challengeWrapper">
    <div class="challenge-toggle" id="challengeToggle">
      <span class="challenge-toggle-star">★</span>
      <div class="challenge-toggle-icon"></div>
      <span class="challenge-toggle-title">Challenge commercial NPS d'avril à juin</span>
      <span class="crown-mini">👑</span>
      <span class="challenge-toggle-sub">Chiffres à jour au 28 mai</span>
    </div>

    <div class="challenge-body" id="challengeBody">
      <div class="challenge-inner">
        <div class="chart-area" id="chartArea"></div>
        <div class="challenge-legend" id="challengeLegend"></div>
      </div>
    </div>
  </div>

</main>

<footer>
  <span>OPAS Dashboard</span>
  <div class="footer-dot"></div>
  <span id="footer-date"></span>
</footer>

<script>
/* ═══════════════════════════════════════════════════
   CONFIG LIENS
═══════════════════════════════════════════════════ */
const CONFIG = [
  {
    category: "Outils utiles",
    links: [
      { label: "Slack", desc: "Accès au chat interne", url: "https://opasespace-de-travail.slack.com" },
      { label: "CRM Pipedrive", desc: "Remplace ton mail et automatise ta relation client", url: "https://opas3.pipedrive.com/" },
      { label: "Payzen", desc: "Pour créer des liens de paiement", url: "https://secure.osb.pf/vads-merchant/" },
      { label: "RDV Para Tip", desc: "Pour la prise de RDV parallélisme à Tipaerui", url: "https://bookings.cloud.microsoft/book/RDVParalllismeOcaniePneusTipaerui@oceanie-pneus.com/?ismsaljsauthenabled" },
      { label: "Calcul fret", desc: "Pour calculer le prix du fret à facturer", url: "calculateur_pneu_fret_maritime.html" },
      { label: "Catalogue de jantes /!/en construction/!/", desc: "Pour voir les jantes dispo", url: "jantes.html" }
    ]
  },
  {
    category: "Formulaires utiles",
    links: [
      { label: "Dépannage", desc: "Pour envoyer les dépanneurs en intervention", url: "https://llcsi7tj.forms.app/demande-depannage" },
      { label: "Stock bas", desc: "Pour alerter et aider Olivier à préparer les commandes", url: "https://llcsi7tj.forms.app/alerte-stock-bas" },
      { label: "Réassort", desc: "Pour demander ta livraison du jour", url: "https://llcsi7tj.forms.app/tipaerui-livre-moi-ca" }
    ]
  },
  {
    category: "Suivi et clients",
    links: [
      { label: "Clifac", desc: "Suivi des clifacs", url: "https://docs.google.com/spreadsheets/d/1Ld_RgMqG-N9qUM5C3NvUiIGAnl3H3haO/edit?usp=sharing&ouid=112211859136093593599&rtpof=true&sd=true" },
      { label: "Balance client", desc: "Suivi de la balance client", url: "https://docs.google.com/spreadsheets/d/1mQ-33kPuVJgrchn79IghtlyRi8_KDfMz/edit?gid=1785126735#gid=1785126735" },
      { label: "Bons d'intervention dépannage", desc: "Suivi des interventions dépannage", url: "https://docs.google.com/spreadsheets/d/11WUKVEfU8zd9uZd1oZnhvXFZPAf_bGjw2j9SXK2TsaE/edit?usp=sharing" },
      { label: "Fret", desc: "Suivi des envois bateaux", url: "https://docs.google.com/spreadsheets/d/1cSYHUirixjsMGuA1LFlt7Qw6YwmUrtYO3NZMjCDUkFc/edit?usp=sharing" },
      { label: "Récap des promos", desc: "Pour connaître nos partenariats et promos", url: "https://docs.google.com/spreadsheets/d/1g46WV0OKEkCsIos6hM5Plp489kUlFW_UYtLEkFwdJmw/edit?usp=sharing" }
    ]
  },
  {
    category: "Ressources",
    links: [
      { label: "Tellent", desc: "Congés, arrêts, etc", url: "https://app.tellent.com/hr/dashboard" },
      { label: "Planning", desc: "Planning des différents garages", url: "https://docs.google.com/spreadsheets/d/1eEggiMVueMvILBDiE9VT6O4A4lDP-Nd2Sn_CxPy-uWY/edit?usp=sharing" },
      { label: "Bons de commande - Docuware", desc: "Pour éditer des bons de commande", url: "https://solari-mobility-pf.docuware.cloud/DocuWare/Platform/WebClient/" }
    ]
  }
];

/* ═══════════════════════════════════════════════════
   CONFIG CHALLENGE
═══════════════════════════════════════════════════ */
const CHALLENGE = {
  paliers: [
    { value: 100000, label: "1er palier",   bonus: "5 000 F",  icon: "🥉" },
    { value: 200000, label: "2ème palier",  bonus: "10 000 F", icon: "🥈" },
    { value: 300000, label: "3ème palier",  bonus: "15 000 F", icon: "👑" }
  ],
  commerciaux: [
    { name: "Tipaerui", ca: 113560, photo: null },
    { name: "Fautaua",  ca: 68995,  photo: null },
    { name: "Taravao",  ca: 207391, photo: null },
    { name: "Papara",   ca: 102151, photo: null },
    { name: "Moorea",   ca: 98511,  photo: null },
    { name: "Pamatai",  ca: 23996,  photo: null }
  ]
};

/* ═══════════════════════════════════════════════════
   RENDU LIENS
═══════════════════════════════════════════════════ */
function parseBadges(str) {
  return str.replace(/\/!\/(.*?)\/!\//g, '<span class="badge">$1</span>');
}

CONFIG.forEach((cat, i) => {
  const num = String(i + 1).padStart(2, '0');
  const section = document.createElement('div');
  section.className = 'category';
  section.innerHTML = `
    <div class="category-header">
      <span class="category-number">${num}</span>
      <span class="category-title">${cat.category}</span>
      <div class="category-line"></div>
    </div>
    <div class="btn-grid">
      ${cat.links.map(link => `
        <a class="link-btn" href="${link.url}" target="_blank" rel="noopener">
          <div>
            <div class="btn-label">${parseBadges(link.label)}</div>
            ${link.desc ? `<div class="btn-desc">${link.desc}</div>` : ''}
          </div>
          <span class="btn-arrow">→</span>
        </a>
      `).join('')}
    </div>
  `;
  document.getElementById('dashboard').appendChild(section);
});

document.getElementById('footer-date').textContent =
  new Date().toLocaleDateString('fr-FR', { day: '2-digit', month: 'long', year: 'numeric' });

/* ═══════════════════════════════════════════════════
   RENDU CHALLENGE
═══════════════════════════════════════════════════ */
function formatCA(n) {
  return new Intl.NumberFormat('fr-FR').format(Math.round(n)) + ' F';
}

function buildChallenge() {
  const chartArea = document.getElementById('chartArea');
  const legendEl  = document.getElementById('challengeLegend');

  const maxCa     = Math.max(...CHALLENGE.commerciaux.map(c => c.ca));
  const maxPalier = Math.max(...CHALLENGE.paliers.map(p => p.value));
  const chartMax  = Math.max(maxCa, maxPalier) * 1.14;

  /* Palier lines */
  CHALLENGE.paliers.forEach(p => {
    const pct = (p.value / chartMax) * 100;
    const line = document.createElement('div');
    line.className = 'palier-line';
    line.style.bottom = pct + '%';
    line.innerHTML = `
      <div class="palier-label">
        <span style="margin-right:4px">${p.icon}</span>${p.label}
        <span class="palier-bonus">${p.bonus}</span>
      </div>
    `;
    chartArea.appendChild(line);
  });

  /* Bar columns */
  CHALLENGE.commerciaux.forEach((c, idx) => {
    const pct     = (c.ca / chartMax) * 100;
    const reached = CHALLENGE.paliers.filter(p => c.ca >= p.value).length;

    const col = document.createElement('div');
    col.className = 'bar-col' + (reached >= 3 ? ' reached-3' : reached >= 2 ? ' reached-2' : '');

    const photoHtml = c.photo
      ? `<div class="bar-photo"><img src="${c.photo}" alt="${c.name}"></div>`
      : `<div class="bar-photo-placeholder">${c.name.slice(0,2).toUpperCase()}</div>`;

    col.innerHTML = `
      <div class="bar-value">${formatCA(c.ca)}</div>
      <div class="bar-photo-wrap">
        <span class="bar-crown">👑</span>
        ${photoHtml}
      </div>
      <div class="bar-fill-wrap" style="height:${pct}%;">
        <div class="bar-fill" data-target="${pct}" data-delay="${idx * 0.1}"></div>
      </div>
      <div class="bar-name">${c.name}</div>
    `;
    chartArea.appendChild(col);
  });

  /* Legend */
  legendEl.innerHTML = CHALLENGE.paliers.map((p, i) => `
    <div class="legend-item">
      <div class="legend-dot" style="opacity:${0.5 + i * 0.25}"></div>
      ${p.icon} ${p.label} —<span class="legend-bonus">&nbsp;${p.bonus}</span>
    </div>
  `).join('');
}

buildChallenge();

/* Init bars at 0 */
document.querySelectorAll('.bar-fill').forEach(bar => {
  bar.style.height = '0%';
});

/* ═══════════════════════════════════════════════════
   TOGGLE + ANIMATION DES BARRES
═══════════════════════════════════════════════════ */
let barsAnimated = false;

document.getElementById('challengeToggle').addEventListener('click', () => {
  const wrapper = document.getElementById('challengeWrapper');
  const isOpen  = wrapper.classList.toggle('open');

  if (isOpen && !barsAnimated) {
    barsAnimated = true;
    setTimeout(() => {
      document.querySelectorAll('.bar-fill').forEach(bar => {
        const delay = parseFloat(bar.getAttribute('data-delay') || 0);
        bar.style.transitionDelay = delay + 's';
        bar.style.height = '100%';
      });
    }, 120);
  }
});
</script>
</body>
</html>
