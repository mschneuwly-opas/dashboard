  .category-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1.15rem;letter-spacing:0.18em;text-transform:uppercase;color:white;}

  .btn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;}
  .link-btn{display:flex;flex-direction:column;justify-content:space-between;padding:22px 24px 20px;background:var(--surface-raised);border:1px solid var(--border);border-left:3px solid var(--orange);text-decoration:none;color:white;cursor:pointer;transition:all 0.2s ease;position:relative;overflow:hidden;min-height:96px;}
  .link-btn::before{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(90deg,transparent,transparent 3px,rgba(255,255,255,0.008) 3px,rgba(255,255,255,0.008) 4px),repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(255,255,255,0.005) 3px,rgba(255,255,255,0.005) 4px);pointer-events:none;}
  .link-btn::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--orange),rgba(236,102,8,0.4),transparent);opacity:0;transition:opacity 0.2s;}
  .link-btn:hover{background-color:#1c1c1c;border-color:rgba(236,102,8,0.35);transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,0.6),0 0 0 1px rgba(236,102,8,0.15),inset 0 1px 0 rgba(255,255,255,0.04);}
  .link-btn:hover::after{opacity:1;}.link-btn:active{transform:translateY(-1px);}
  .btn-label{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1.18rem;letter-spacing:0.06em;text-transform:uppercase;line-height:1.25;padding-right:28px;}
  .btn-label .badge{display:inline-block;background:rgba(236,102,8,0.12);border:1px solid rgba(236,102,8,0.4);color:var(--orange);font-size:0.58rem;letter-spacing:0.1em;padding:2px 7px;margin-left:7px;vertical-align:middle;font-family:'DM Sans',sans-serif;font-weight:600;text-transform:uppercase;}
  .btn-desc{font-size:0.82rem;color:var(--gray);margin-top:6px;font-weight:400;letter-spacing:0.02em;line-height:1.5;}
  .btn-arrow{position:absolute;right:20px;top:50%;transform:translateY(-50%);color:var(--orange);font-size:1.1rem;opacity:0.4;transition:all 0.2s ease;}
  .link-btn:hover .btn-arrow{opacity:1;right:16px;}
  footer{position:relative;z-index:1;padding:24px 48px;border-top:1px solid rgba(154,155,156,0.08);display:flex;align-items:center;justify-content:space-between;}
  footer span{font-size:0.75rem;color:rgba(154,155,156,0.35);letter-spacing:0.1em;text-transform:uppercase;}

  @media(max-width:768px){header,main,footer{padding-left:20px;padding-right:20px;}header{min-height:80px;gap:20px;}.header-logo{height:40px;}header h1{font-size:1.8rem;}.btn-grid{grid-template-columns:1fr;}.challenge-inner{padding:20px 12px 32px;}.header-divider{display:none;}.challenge-toggle-sub{display:none;}}

  for(let q=0.25;q<=1;q+=0.25){const gy=PT+cH*(1-q);o+=`<line x1="${PL}" y1="${gy}" x2="${PL+cW}" y2="${gy}" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>`;}
  const pIcons=['🥉','🥈','👑'];
  pal.forEach((p,pi)=>{const py=vY(p.value);const lx=PL+cW+10;o+=`<line stroke-dasharray="6 4" stroke="rgba(236,102,8,0.55)" stroke-width="1" x1="${PL}" y1="${py}" x2="${PL+cW}" y2="${py}"/><rect x="${lx}" y="${py-22}" width="${PR-14}" height="38" fill="#0a0a0a" stroke="rgba(236,102,8,0.35)" stroke-width="1" rx="1"/><text x="${lx+8}" y="${py-5}" font-family="'Barlow Condensed',sans-serif" font-size="11" font-weight="700" fill="#ec6608" letter-spacing="1">${pIcons[pi]} ${p.label.toUpperCase()}</text><text x="${lx+8}" y="${py+11}" font-family="'DM Sans',sans-serif" font-size="12" font-weight="600" fill="white">${p.bonus}</text>`;});
  comm.forEach((c,i)=>{
    const fullH=(c.ca/dMax)*cH;const finalY=vY(c.ca);const bx=cx(i)-barW/2;const cy_=cx(i);
    const reached=pal.filter(p=>c.ca>=p.value).length;const gId=reached>0?'bGA':'bG';
    const d=(i*0.12).toFixed(2);const ed=(parseFloat(d)+1.05).toFixed(2);
    if(reached>0)o+=`<rect x="${bx-4}" y="${finalY-2}" width="${barW+8}" height="${fullH+4}" fill="url(#bG)" rx="4" opacity="0.2" style="filter:blur(7px)"/>`;
    o+=`<rect x="${bx}" y="${cBot}" width="${barW}" height="0" fill="url(#${gId})" rx="2"><animate attributeName="y" from="${cBot}" to="${finalY.toFixed(2)}" dur="1.1s" begin="${d}s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="${sp}"/><animate attributeName="height" from="0" to="${fullH.toFixed(2)}" dur="1.1s" begin="${d}s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="${sp}"/></rect>`;
    o+=`<rect x="${bx}" y="${cBot}" width="${barW}" height="0" fill="rgba(255,255,255,0.22)" rx="2"><animate attributeName="y" from="${cBot}" to="${finalY.toFixed(2)}" dur="1.1s" begin="${d}s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="${sp}"/><animate attributeName="height" from="0" to="4" dur="1.1s" begin="${d}s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="${sp}"/></rect>`;
    o+=`<text x="${cy_}" y="${finalY-aR*2-16}" text-anchor="middle" font-family="'Barlow Condensed',sans-serif" font-size="13" font-weight="700" fill="rgba(255,255,255,0.85)" opacity="0">${formatCA(c.ca)}<animate attributeName="opacity" from="0" to="1" dur="0.35s" begin="${ed}s" fill="freeze"/></text>`;
    const rc=reached>0?'#ec6608':'rgba(236,102,8,0.35)';const rg=reached>0?'style="filter:drop-shadow(0 0 7px rgba(236,102,8,0.65))"':'';
    o+=`<circle cx="${cy_}" cy="${finalY-aR-6}" r="${aR}" fill="#2a2a2a" stroke="${rc}" stroke-width="2" ${rg}/><text x="${cy_}" y="${finalY-aR-6+5}" text-anchor="middle" font-family="'Barlow Condensed',sans-serif" font-size="14" font-weight="700" fill="#ec6608">${c.name.slice(0,2).toUpperCase()}</text>`;
    if(reached>=2)o+=`<text x="${cy_}" y="${finalY-aR*2-30}" text-anchor="middle" font-size="16" opacity="0">👑<animate attributeName="opacity" from="0" to="1" dur="0.35s" begin="${ed}s" fill="freeze"/></text>`;
    o+=`<text x="${cy_}" y="${cBot+20}" text-anchor="middle" font-family="'Barlow Condensed',sans-serif" font-size="13" font-weight="700" fill="#b8b9ba" letter-spacing="1.5">${c.name.toUpperCase()}</text>`;
  });
  o+=`</svg>`;
  wrap.innerHTML=o;
  leg.innerHTML=pal.map((p,i)=>`<div class="legend-item"><div class="legend-dot" style="opacity:${0.5+i*0.25}"></div>${p.icon} ${p.label} —<span class="legend-bonus">&nbsp;${p.bonus}</span></div>`).join('');
}
let bA=false;
document.getElementById('challengeToggle').addEventListener('click',()=>{
  const w=document.getElementById('challengeWrapper');const o=w.classList.toggle('open');
  if(o&&!bA){bA=true;setTimeout(buildSvgChart,80);}
});
</script>
